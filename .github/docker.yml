name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Application
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: manish2802
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t manish2802/springboot-app:${{ github.sha }} .
          docker tag manish2802/springboot-app:${{ github.sha }} manish2802/springboot-app:latest

      - name: Push Docker Image
        run: |
          docker push manish2802/springboot-app:${{ github.sha }}
          docker push manish2802/springboot-app:latest